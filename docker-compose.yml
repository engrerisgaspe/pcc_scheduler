services:
  db:
    image: postgres:17-alpine
    container_name: school_scheduler_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: school_scheduler
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: school_scheduler_api
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/school_scheduler?schema=public
      PORT: 4000
      NODE_ENV: production
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: school_scheduler_web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8443:80"

volumes:
  postgres_data:
